name: quote_app_new
description: A premium quote app

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^2.25.0
  cloud_firestore: ^4.15.0
  http: ^1.2.1
  shared_preferences: ^2.2.2
  share_plus: ^7.2.1
  firebase_auth: ^4.17.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

# ✅ THIS stays under flutter
flutter:
  uses-material-design: true

  assets:
    - assets/icon.png

# ❗ OUTSIDE flutter (IMPORTANT)
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

# ❗ ALSO OUTSIDE flutter
flutter_native_splash:
  color: "#000000"
  image: assets/icon.png
  android: true
  ios: true